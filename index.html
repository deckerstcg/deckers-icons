<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, viewport-fit=cover"
  >

  <title>Deckers Scheduler</title>

  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta
    name="apple-mobile-web-app-status-bar-style"
    content="black-translucent"
  >
  <meta name="apple-mobile-web-app-title" content="Deckers Scheduler">

  <link
    rel="apple-touch-icon"
    sizes="180x180"
    href="./apple-touch-icon-180.png"
  >

  <link
    rel="icon"
    type="image/png"
    sizes="32x32"
    href="./favicon-32.png"
  >

  <link rel="manifest" href="./manifest.webmanifest">

  <style>
    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #000;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    }

    body {
      display: grid;
      place-items: center;
    }

    .loading {
      text-align: center;
    }

    .loading img {
      width: 96px;
      height: 96px;
      border-radius: 22px;
      margin-bottom: 14px;
    }
  </style>
</head>

<body>
  <div class="loading">
    <img
      src="./apple-touch-icon-180.png"
      alt="Deckers Scheduler"
    >
    <p>Opening Deckers Scheduler…</p>
  </div>

  <script>
    const schedulerUrl =
      "https://script.google.com/macros/s/AKfycbycoY3EUVlnHBtPUB0jcz7gFE-Szx9ZPWuGpHDTR3IQ3wnmoEOPNOXb0fSzqLkHaWOv8A/exec";

    window.location.replace(schedulerUrl);
  </script>
</body>
</html>
