<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, viewport-fit=cover"
  >

  <title>Deckers Scheduler</title>

  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta
    name="apple-mobile-web-app-status-bar-style"
    content="black-translucent"
  >
  <meta
    name="apple-mobile-web-app-title"
    content="Deckers Scheduler"
  >

  <link
    rel="apple-touch-icon"
    sizes="180x180"
    href="./apple-touch-icon-180.png"
  >

  <link
    rel="icon"
    type="image/png"
    sizes="32x32"
    href="./favicon-32.png"
  >

  <link rel="manifest" href="./manifest.webmanifest">

  <style>
    :root {
      color-scheme: dark;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      min-height: 100%;
      font-family:
        -apple-system,
        BlinkMacSystemFont,
        "Segoe UI",
        sans-serif;
      background:
        radial-gradient(circle at top, #3b1263, #12081f 60%, #000);
      color: #fff;
    }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .card {
      width: min(100%, 360px);
      text-align: center;
      background: rgba(255,255,255,.08);
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 28px;
      padding: 28px;
      backdrop-filter: blur(18px);
      box-shadow: 0 20px 60px rgba(0,0,0,.35);
    }

    .app-icon {
      width: 112px;
      height: 112px;
      border-radius: 26px;
      display: block;
      margin: 0 auto 18px;
      box-shadow: 0 14px 30px rgba(0,0,0,.35);
    }

    h1 {
      margin: 0 0 8px;
      font-size: 28px;
    }

    p {
      margin: 0 0 22px;
      color: rgba(255,255,255,.72);
      line-height: 1.45;
    }

    .open-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      min-height: 52px;
      border: 0;
      border-radius: 16px;
      background: #0A84FF;
      color: #fff;
      text-decoration: none;
      font-weight: 750;
      font-size: 17px;
    }

    .hint {
      margin-top: 18px;
      font-size: 13px;
      color: rgba(255,255,255,.58);
    }
  </style>
</head>

<body>
  <main class="card">
    <img
      class="app-icon"
      src="./apple-touch-icon-180.png"
      alt="Deckers Scheduler"
    >

    <h1>Deckers Scheduler</h1>

    <p>
      Add this page to your Home Screen first,
      then open the scheduler.
    </p>

    <a
      class="open-button"
      href="PASTE_YOUR_APPS_SCRIPT_EXEC_URL_HERE"
    >
      Open Scheduler
    </a>

    <div class="hint">
      In Safari, tap Share, then Add to Home Screen.
    </div>
  </main>
</body>
</html>
