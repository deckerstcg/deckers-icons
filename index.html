<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, viewport-fit=cover"
  >

  <title>Deckers Scheduler</title>

  <link
    rel="apple-touch-icon"
    sizes="180x180"
    href="/deckers-icons/apple-touch-icon-180.png"
  >

  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Deckers Scheduler">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">

  <script>
    const schedulerUrl =
      "https://script.google.com/macros/s/AKfycbycoY3EUVlnHBtPUB0jcz7gFE-Szx9ZPWuGpHDTR3IQ3wnmoEOPNOXb0fSzqLkHaWOv8A/exec";

    const isStandalone =
      window.matchMedia("(display-mode: standalone)").matches ||
      window.navigator.standalone === true;

    // Redirect only after the installed Home Screen icon is opened.
    if (isStandalone) {
      window.location.replace(schedulerUrl);
    }
  </script>

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      box-sizing: border-box;
      font-family: system-ui, sans-serif;
      text-align: center;
    }

    main {
      max-width: 420px;
    }

    img {
      width: 120px;
      height: 120px;
      border-radius: 24px;
    }

    a {
      display: inline-block;
      margin-top: 20px;
      padding: 14px 22px;
      border-radius: 12px;
      background: #111;
      color: white;
      text-decoration: none;
      font-weight: 600;
    }
  </style>
</head>

<body>
  <main>
    <img
      src="/deckers-icons/apple-touch-icon-180.png"
      alt="Deckers Scheduler"
    >

    <h1>Deckers Scheduler</h1>

    <p>
      In Safari, tap Share and then Add to Home Screen.
    </p>

    <a href="https://script.google.com/macros/s/AKfycbycoY3EUVlnHBtPUB0jcz7gFE-Szx9ZPWuGpHDTR3IQ3wnmoEOPNOXb0fSzqLkHaWOv8A/exec">
      Open Scheduler
    </a>
  </main>
</body>
</html>
